<!doctype html>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:

          radial-gradient(circle at top right, rgba(99, 138, 97, 0.16), transparent 24%),
          #f7f1e7;
        color: #14221d;
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;

      h1 {

        line-height: 1.05;

    <main>
